---
layout : default
---
<article>
  <div class="post">
    <div class="post-des">
      <h1 class="post-title">{{page.title}}</h1>
      <p style="text-align:center; color: grey; font-size:12px;"><i class="fa fa-calendar"></i> {{page.last_written}}&nbsp&nbsp&nbsp&nbsp<i class="fa fa-pencil"></i>  {{page.author}}</p>
      <p style="text-align:center; color: grey; font-size:12px;"><i class="fa fa-tag"></i> {{page.tag}}</p>
    </div>
    {{content}}
    <br><br>
  </div>
</article>
<br>
